<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2048 게임 - 회원가입</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #faf8ef; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="submit"] { width: 100%; padding: 10px; background-color: #8f7a66; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .error { color: #f44336; margin-bottom: 10px; font-size: 14px; }
        .success { color: #4CAF50; margin-bottom: 10px; font-size: 14px; }
        .link { margin-top: 15px; font-size: 14px; }
        a { color: #8f7a66; }
    </style>
</head>
<body>
    <div class="box">
        <h2>2048 회원가입</h2>
        {% if error %} <div class="error">{{ error }}</div> {% endif %}
        {% if success %} <div class="success">{{ success }}</div> {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="사용할 아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <input type="submit" value="가입하기">
        </form>
        <div class="link">
            이미 계정이 있나요? <a href="/login/">로그인하기</a>
        </div>
    </div>
</body>
</html>
