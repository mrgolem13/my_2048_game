<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2048 웹 게임</title>
    <style>
        body { font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif; background-color: #faf8ef; color: #776e65; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .header { width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-info { font-size: 16px; font-weight: bold; }
        .nav-links a { margin-left: 10px; color: #8f7a66; font-weight: bold; text-decoration: none; }
        .score-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .score-box { background: #bbada0; color: white; min-width: 80px; padding: 5px 10px; text-align: center; border-radius: 3px; font-weight: bold; }
        .score-box .label { display: block; font-size: 11px; color: #eee; text-transform: uppercase; }
        .score-box .value { font-size: 20px; }
        /* 4x4 게임판 */
        #game-container { width: 400px; height: 400px; background: #bbada0; border-radius: 6px; position: relative; padding: 15px; box-sizing: border-box; }
        .grid-row { display: flex; margin-bottom: 15px; }
        .grid-row:last-child { margin-bottom: 0; }
        .grid-cell { width: 73px; height: 73px; margin-right: 15px; background: rgba(238, 228, 218, 0.35); border-radius: 3px; }
        .grid-cell:last-child { margin-right: 0; }
        /* templates/index.html 의 <style> 내부에 추가 */

        /* 생성되는 숫자 패널의 공통 디자인 */
        .tile {
        width: 73px;
        height: 73px;
        line-height: 73px;
        font-size: 35px;
        font-weight: bold;
        text-align: center;
        position: absolute;
        border-radius: 3px;
        z-index: 10;

        transition: top 0.1s ease-in-out, left o.1s ease-in-out;
    }
    @keyframes pop {
        0% { transform: scale(0); }
        100% { transform: scale(1); }
    }
    .tile-new {
        animation: pop 0.15s ease-in-out;
    }

        /* 숫자별 배경색 및 글자색 지정 (2048 고유 디자인) */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: 30px; }
        .tile-256 { background: #edcc61; color: white; font-size: 30px; }
        .tile-512 { background: #edc850; color: white; font-size: 30px; }
        .tile-1024 { background: #edc53f; color: white; font-size: 22px; }
        .tile-2048 { background: #edc22e; color: white; font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">👤 {{ username }} 님</div>
        <div class="nav-links">
            <a href="/ranking/">🏆 랭킹 보기</a>
            <a href="/logout/" style="color: #f44336;">로그아웃</a>
        </div>
    </div>

    <div class="score-container">
        <div class="score-box">
            <span class="label">SCORE</span>
            <span class="value" id="current-score">0</span>
        </div>
        <div class="score-box">
            <span class="label">BEST RECORD</span>
            <span class="value">{{ best_score }}</span>
        </div>
    </div>

    <div id="game-container">
        <div class="grid-row">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div class="grid-row">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div class="grid-row">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div class="grid-row">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
    </div>

    <p style="margin-top: 20px; font-size: 14px;">방향키(←, ↑, →, ↓)를 움직여 타일을 합치세요!</p>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
