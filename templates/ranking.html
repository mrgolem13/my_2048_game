<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2048 명예의 전당</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #faf8ef; color: #776e65; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .container { background: white; padding: 30px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background-color: #8f7a66; color: white; }
        tr:hover { background-color: #f9f6f2; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #8f7a66; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏆 2048 명예의 전당 (Top 10)</h2>
        <p>가장 높은 스코어를 달성한 플레이어 목록입니다.</p>

        <table>
            <thead>
                <tr>
                    <th>순위</th>
                    <th>아이디</th>
                    <th>최고 점수</th>
                    <th>최대 블록</th>
                </tr>
            </thead>
            <tbody>
                {{ rankList | safe }}
            </tbody>
        </table>

        <a href="/" class="btn">다시 게임하러 가기</a>
    </div>
</body>
</html>
